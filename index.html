<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>卡片地圖 Prototype</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
  <link rel="stylesheet" href="assets/css/styles.css" />

</head>
<body>
  <div class="topbar">
    <div class="topbar-title">
      <h1>卡片地圖</h1>
    </div>
    <div class="topbar-actions">
      <div class="topbar-search">
        <input id="topbarSearchInput" type="text" placeholder="全文檢索卡片內容" />
        <button id="topbarSearchBtn" class="icon-btn search-icon-btn" aria-label="全文檢索" title="全文檢索"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg></button>
      </div>
      <button id="openSettingsBtn" class="icon-btn primary gear-btn" aria-label="開啟設置" title="設置">⚙</button>
    </div>
  </div>

  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

  <div class="app">
    <aside class="panel sidebar drawer" id="sidebarDrawer">
      <div class="panel-header">
        <div class="sidebar-header-row">
          <div class="panel-title-wrap">
            <h1>設定面板</h1>
            <p>從本機匯入 Markdown 卡片，解析 internal links，自動生成力導向網絡。</p>
          </div>
          <button id="closeSettingsBtn" class="icon-btn ghost" aria-label="關閉設置">✕</button>
        </div>
      </div>
      <div class="panel-body">
        <div class="control-group">
          <label>匯入卡片資料夾</label>
          <div class="btn-row">
            <label class="file-label primary" for="folderInput">選取資料夾</label>
            <button id="loadDemoBtn">顯示 Firebase 卡片庫</button>
            <button id="exportFirebaseZipBtn">匯出 Firebase 卡片 ZIP</button>
            <button id="clearBtn" class="danger">清空</button>
          </div>
          <input id="folderInput" class="file-input" type="file" webkitdirectory directory multiple accept=".md,text/markdown" />
          <div class="hint">可由本機資料夾批次讀入 Markdown，或直接讀取 Firebase Realtime Database 的卡片庫。</div>
          <div class="stats">
            <button type="button" class="stat-card stat-card-button" id="cardListBtn" title="查看目前讀取的卡片列表"><div class="value" id="statNodes">0</div><div class="label">卡片數</div></button>
            <button type="button" class="stat-card stat-card-button" id="linkStatsBtn" title="查看卡片連結統計"><div class="value" id="statLinks">0</div><div class="label">連結數</div></button>
            <div class="stat-card"><div class="value" id="statGroups">0</div><div class="label">群組數</div></div>
          </div>
        </div>

        <input id="searchInput" type="hidden" />

        <div class="control-group">
          <div class="row">
            <div>
              <label for="filterMode">顯示模式</label>
              <select id="filterMode">
                <option value="highlight">只高亮符合者</option>
                <option value="filter">只保留符合者與相鄰節點</option>
              </select>
            </div>
            <div>
              <label for="groupMode">群組著色</label>
              <select id="groupMode">
                <option value="folder">依資料夾</option>
                <option value="tag">依第一個標籤</option>
                <option value="none">不分群</option>
              </select>
            </div>
          </div>
          <div class="hint">資料夾分群最穩；標籤分群適合你卡片已經有一致標記規則時使用。</div>
        </div>

        <div class="control-group">
          <label for="localDepth">Local Graph 深度</label>
          <div class="row">
            <div>
              <input id="localDepth" type="range" min="1" max="4" step="1" value="1" />
            </div>
            <div>
              <input id="localDepthValue" type="number" min="1" max="4" step="1" value="1" />
            </div>
          </div>
          <div class="mode-panel-control" style="margin-top:10px;">
            <div class="chip mode-chip status-only" id="modeChip">
              <span class="mode-label" id="modeChipText">目前：全域圖</span>
            </div>
          </div>
        </div>

        <div class="control-group">
          <label>Force 參數</label>
          <label for="chargeRange">排斥力</label>
          <input id="chargeRange" type="range" min="-600" max="-20" step="10" value="-180" />
          <label for="linkDistanceRange">連線距離</label>
          <input id="linkDistanceRange" type="range" min="30" max="240" step="5" value="90" />
          <label for="centerForceRange">中心力</label>
          <input id="centerForceRange" type="range" min="0" max="1" step="0.02" value="0.08" />
          <label for="collisionRange">碰撞半徑倍率</label>
          <input id="collisionRange" type="range" min="0.5" max="4" step="0.1" value="1.6" />
          <div class="btn-row" style="margin-top:10px;">
            <button id="applyForceBtn" class="primary">套用參數</button>
            <button id="resetForceBtn">重設</button>
          </div>
        </div>
      </div>
    </aside>

    <main class="panel main-panel">
      <div class="graph-wrap" id="graphWrap">
        <div class="graph-overlay">
          <div class="chip mode-chip graph-mode-toggle">
            <span>全域</span>
            <label class="mode-switch" title="切換全域／鄰近網路">
              <input type="checkbox" id="graphModeSwitch" aria-label="切換全域與鄰近網路" />
              <span class="mode-switch-slider"></span>
              <span class="mode-switch-knob"></span>
            </label>
            <span>鄰近</span>
          </div>
        </div>
        <svg id="graphSvg"></svg>
        <div id="graphContextMenu" class="graph-context-menu hidden" role="menu" aria-hidden="true">
          <button id="newCardFromMapBtn" type="button" role="menuitem">新增卡片</button>
        </div>
        <div class="tooltip" id="tooltip"></div>
        <div class="minimap" id="minimap" aria-hidden="true">
          <div class="minimap-title"><strong>全域快照</strong><span>目前視野</span></div>
          <svg id="minimapSvg" viewBox="0 0 216 134" preserveAspectRatio="xMidYMid meet"></svg>
        </div>
      </div>
    </main>

    <div class="column-resizer" id="columnResizer" aria-label="調整右欄寬度" title="拖曳調整右欄寬度"></div>

    <aside class="panel detail">
      <div class="panel-body" id="detailPanel">
        <div class="empty">尚未選取卡片。匯入資料後，點擊圖上的節點即可在右欄查看內容。</div>
      </div>
    </aside>
  </div>

  <div class="modal" id="searchModal">
    <div class="modal-card">
      <div class="modal-top">
        <div>
          <h3>全文檢索結果</h3>
          <div class="muted" id="searchModalSummary">請輸入關鍵字後搜尋。</div>
        </div>
        <div class="modal-actions">
          <button id="closeSearchModalBtn" class="ghost">關閉</button>
        </div>
      </div>
      <div id="searchModalResults" class="search-results">
        <div class="empty">尚無結果。</div>
      </div>
    </div>
  </div>



  <div class="modal" id="cardListModal">
    <div class="modal-card">
      <div class="modal-top">
        <div>
          <h3>目前讀取的卡片列表</h3>
          <div class="muted" id="cardListSummary">尚未讀取卡片。</div>
        </div>
        <div class="modal-actions">
          <button id="closeCardListModalBtn" class="ghost">關閉</button>
        </div>
      </div>
      <div id="cardListResults">
        <div class="empty">尚未讀取卡片。</div>
      </div>
    </div>
  </div>


  <div class="modal" id="linkStatsModal">
    <div class="modal-card">
      <div class="modal-top">
        <div>
          <h3>卡片連結統計</h3>
          <div class="muted" id="linkStatsSummary">尚未讀取卡片。</div>
        </div>
        <div class="modal-actions">
          <button id="closeLinkStatsModalBtn" class="ghost">關閉</button>
        </div>
      </div>
      <div id="linkStatsResults">
        <div class="empty">尚未讀取卡片。</div>
      </div>
    </div>
  </div>


  <script type="module" src="assets/js/app.js"></script>

</body>
</html>
