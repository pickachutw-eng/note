<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卡片資料庫</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- Main Navigation -->
    <header class="main-header">
      <h1>🎴 卡片資料庫</h1>
      <nav class="main-nav">
        <button class="nav-btn active" data-tab="organize">整理卡片</button>
        <button class="nav-btn" data-tab="map">卡片地圖</button>
      </nav>
    </header>

    <!-- ── Tab 1: 整理卡片 ── -->
    <section id="tab-organize" class="tab-content active">
      <div class="organize-layout">
        <!-- Left: Raw Card List -->
        <aside class="raw-panel">
          <div class="panel-header">
            <h2>原始卡片列表</h2>
            <div class="panel-actions">
              <label class="upload-btn" title="上傳 MD 檔">
                ＋ 上傳
                <input type="file" id="rawUploadInput" accept=".md" multiple hidden>
              </label>
              <button type="button" id="newCardBtn" class="create-btn">✦ 創建新卡片</button>
            </div>
          </div>
          <ul id="rawCardList" class="card-list">
            <li class="empty-hint">載入中…</li>
          </ul>
          <div class="panel-section-header">
            <h2>已編輯過卡片列表</h2>
          </div>
          <ul id="editedCardList" class="card-list edited-list">
            <li class="empty-hint">尚無已編輯卡片</li>
          </ul>
        </aside>

        <!-- Right: Edit Form -->
        <main class="edit-panel">
          <h2>編輯卡片</h2>
          <form id="editForm" class="edit-form">
            <div class="form-row">
              <label>ID <span class="hint">（依時間自動生成）</span></label>
              <input type="text" id="cardId" name="id" placeholder="202604101437" readonly>
            </div>
            <div class="form-row">
              <label>標題</label>
              <input type="text" id="cardTitle" name="title" placeholder="卡片標題" required>
            </div>
            <div class="form-row">
              <label>分類</label>
              <select id="cardType" name="type">
                <option value="">— 請選擇分類 —</option>
                <option value="問題卡">問題卡</option>
                <option value="地圖卡">地圖卡</option>
              </select>
            </div>
            <div class="form-row">
              <label>關聯卡片 <span class="hint">（逗號分隔 ID）</span></label>
              <input type="text" id="cardRelated" name="related" placeholder="202604101437, 202604101500">
            </div>
            <div class="form-row">
              <label>Tags <span class="hint">（逗號分隔）</span></label>
              <input type="text" id="cardTags" name="tags" placeholder="tag1, tag2">
            </div>
            <div class="form-row">
              <label>圖檔</label>
              <div class="image-upload-area">
                <input type="file" id="imageInput" accept="image/*" hidden>
                <button type="button" id="imageUploadBtn" class="btn-secondary">選擇圖片</button>
                <span id="imageFilename" class="image-filename">未選擇</span>
                <input type="hidden" id="cardImage" name="image">
              </div>
              <img id="imagePreview" class="image-preview" src="" alt="" hidden>
            </div>
            <div class="form-row">
              <label>內容</label>
              <textarea id="cardContent" name="content" rows="10" placeholder="卡片內容…"></textarea>
            </div>
            <div class="form-actions">
              <button type="button" id="clearFormBtn" class="btn-secondary">清除</button>
              <button type="submit" class="btn-primary">💾 儲存卡片</button>
            </div>
            <div id="formMsg" class="form-msg"></div>
          </form>
        </main>
      </div>
    </section>

    <!-- ── Tab 2: 卡片地圖 ── -->
    <section id="tab-map" class="tab-content">
      <div class="map-controls">
        <input type="text" id="searchInput" placeholder="🔍 搜尋卡片…">
        <select id="typeFilter">
          <option value="">全部類型</option>
          <option value="問題卡">問題卡</option>
          <option value="地圖卡">地圖卡</option>
        </select>
        <button id="resetFilterBtn" class="btn-secondary">重置</button>
        <span id="cardCount" class="card-count"></span>
      </div>
      <div class="cards-grid" id="cardsGrid"></div>
    </section>
  </div>
  <script src="script.js"></script>
</body>
</html>
